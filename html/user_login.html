<!DOCTYPE html>
<html lang="ko">

<head>
    <script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>아무 말 대잔치 - 로그인</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/pages/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+KR:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-title-wrapper">
            <a href="/main" class="header-home-link"><h2>아무 말 대잔치</h2></a>
        </div>
    </header>
    <div class="login-container">
        <h2>로그인</h2>
        <form id="login-form">
            <div class="input-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" required placeholder="이메일을 입력하세요" autocomplete="email">
                <span id="email-helper"></span>
            </div>
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required placeholder="비밀번호를 입력하세요"
                    autocomplete="current-password">
                <span id="password-helper"></span>
            </div>
            <button type="submit" class="login-btn" disabled>로그인</button>
        </form>
        <div class="social-login-divider">또는</div>
        <div class="social-login-buttons">
            <a id="kakao-login-btn" class="social-login-btn social-login-btn--kakao" href="#">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.46 2 10.65c0 2.68 1.75 5.04 4.4 6.38-.16.56-.58 2.04-.66 2.36-.1.4.15.39.31.28.13-.08 2.04-1.38 2.86-1.95.68.1 1.38.15 2.09.15 5.52 0 10-3.46 10-7.72C22 6.46 17.52 3 12 3z"/></svg>
                카카오 로그인
            </a>
            <a id="naver-login-btn" class="social-login-btn social-login-btn--naver" href="#">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.27 3H7.73A4.73 4.73 0 003 7.73v8.54A4.73 4.73 0 007.73 21h8.54A4.73 4.73 0 0021 16.27V7.73A4.73 4.73 0 0016.27 3zm.46 12.6h-2.85l-3.06-4.36v4.36H7.97V8.4h2.85l3.06 4.36V8.4h2.85v7.2z"/></svg>
                네이버 로그인
            </a>
        </div>
        <div class="links">
            <a href="/signup">회원가입</a>
            <a href="/find-account">이메일 / 비밀번호 찾기</a>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module" src="/js/app/login.js"></script>
</body>

</html>
