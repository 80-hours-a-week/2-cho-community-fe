server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    server_tokens off;

    # 보안 헤더
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss: https:; frame-ancestors 'none'" always;

    # 클린 URL 리라이트 (CloudFront Functions 매핑과 동일)
    location = /              { try_files /html/user_login.html =404; }
    location = /main          { try_files /html/post_list.html =404; }
    location = /login         { try_files /html/user_login.html =404; }
    location = /signup        { try_files /html/user_signup.html =404; }
    location = /password      { try_files /html/user_password.html =404; }
    location = /detail        { try_files /html/post_detail.html =404; }
    location = /write         { try_files /html/post_write.html =404; }
    location = /edit          { try_files /html/post_edit.html =404; }
    location = /edit-profile  { try_files /html/user_edit.html =404; }
    location = /find-account  { try_files /html/user_find_account.html =404; }
    location = /notifications { try_files /html/notifications.html =404; }
    location = /my-activity   { try_files /html/my-activity.html =404; }
    location = /verify-email  { try_files /html/verify-email.html =404; }
    location = /user-profile  { try_files /html/user-profile.html =404; }
    location = /messages      { try_files /html/dm_list.html =404; }
    location = /messages/inbox  { try_files /html/dm.html =404; }
    location = /messages/detail { try_files /html/dm_detail.html =404; }
    location = /admin/reports   { try_files /html/admin_reports.html =404; }
    location = /admin/dashboard { try_files /html/admin_dashboard.html =404; }
    location = /social-signup   { try_files /html/social_signup.html =404; }
    location = /packages        { try_files /html/package_list.html =404; }
    location = /packages/detail { try_files /html/package_detail.html =404; }
    location = /packages/write  { try_files /html/package_write.html =404; }
    location = /badges          { try_files /html/badges.html =404; }
    location = /wiki            { try_files /html/wiki_list.html =404; }
    location = /wiki/write      { try_files /html/wiki_write.html =404; }
    location = /wiki/edit       { try_files /html/wiki_edit.html =404; }

    # 위키 상세 페이지: /wiki/{slug} 동적 라우팅
    location ~ ^/wiki/(?!write$|edit$).+ {
        try_files /html/wiki_detail.html =404;
    }

    # 정적 에셋 캐싱
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # MPA 폴백 (SPA가 아니므로 index.html 미사용)
    location / {
        try_files $uri $uri/ =404;
    }

    # gzip 압축
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
